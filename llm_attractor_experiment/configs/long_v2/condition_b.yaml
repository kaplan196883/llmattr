# exp_long_v2 condition B — warmer exploration (T=1.1)
experiment_id: exp_long_v2_B

generation_model: gpt-4o-mini
embedding_model: text-embedding-3-small

steps_per_run: 40
runs_per_condition: 5
initial_conditions_per_family: 3

max_output_tokens: 120
temperature: 1.1
top_p: 1.0
include_logprobs: false

clip_rule: tail_chars
max_context_chars: 12000

rolling_window_k: 3
context_tail_chars: 4000
observables: [output, rolling_k3, rolling_k5, context_tail]

pca_dims: [2, 10, 20]

clustering:
  method: kmeans
  dbscan: {eps: 0.08, min_samples: 4}
  kmeans: {n_clusters: 8}

recurrence: {metric: cosine, epsilon: 0.15, tau: 3}

dwell: {space: pca10}

tsne:
  enabled: true
  perplexity: 30
  pre_pca_dim: 50
  metric: cosine
  include_in_metrics: false      # v2 demotes t-SNE to visualization-only
  recurrence_epsilon_std_frac: 0.08
  cluster_in_tsne: false

basin:
  target_region_late_fraction: 0.3
  target_step_fraction: 0.7
  perturbations: [suffix, neutral_sentence, seed_only]

basin_entry:
  enabled: true
  late_fraction: 0.3
  fraction_after: 0.7

late_recurrence:
  enabled: true
  start_fraction: 0.7
  use_basin_entry: true

exit_return:
  enabled: true
  start_fraction: 0.0
  use_basin_entry: true

bootstrap:
  enabled: true
  n_resamples: 1000
  confidence: 0.95

baseline_modes: [no_feedback, time_shuffled]

batch_embeddings: false
use_evals: false

seed: 42
parallel_trajectories: 1
output_dir: data

prompt_families:
  - name: reflective
    system_prompt: "Continue the text naturally. Do not summarize or explain."
    initial_conditions:
      - "I keep returning to the same thought without knowing why."
      - "The shape of attention is the shape of what becomes real."
      - "Every explanation seems to orbit something it cannot touch."
  - name: story
    system_prompt: "Continue the text naturally. Do not summarize or explain."
    initial_conditions:
      - "The lighthouse had not been lit for thirteen years when she climbed the stairs."
      - "He opened the envelope in the rain and read the first line twice."
      - "The train slowed without reason in a landscape nobody named."
  - name: conceptual
    system_prompt: "Continue the text naturally. Do not summarize or explain."
    initial_conditions:
      - "A system that observes itself must pay a price in resolution."
      - "Meaning is the shadow cast by constraint."
      - "Every recursive process has a horizon past which prediction dissolves."
