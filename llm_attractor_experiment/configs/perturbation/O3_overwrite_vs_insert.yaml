# O3 overwrite-vs-insert experiment (review round-3 #4 follow-up).
#
# Same design as O2_overwrite_vs_insert.yaml but with the O3
# summarize-and-negate operator. Tests whether the 60-80 pp
# overwrite-vs-insert gap measured for O2 (§5.10.11) generalises
# to O3, which has a different replace-mode operator (content-
# degrading template rather than content-preserving paraphrase).
#
# Predicted outcome: similar large gap (the overwrite mechanism is
# operator-independent), but the O3 insert-mode rate may differ
# from O2's because the summarize-and-negate template imposes a
# different pull on the post-insertion generation.

experiment_id: exp_perturb_O3_overwrite_vs_insert
generation_model: gpt-4o-mini
embedding_model: text-embedding-3-small
steps_per_run: 30
runs_per_condition: 2
initial_conditions_per_family: 5
max_output_tokens: 120
temperature: 0.8
top_p: 1.0
include_logprobs: false
clip_rule: tail_chars
max_context_chars: 12000
loop_mode: replace
rolling_window_k: 3
context_tail_chars: 4000
context_full_chars: 8000
observables:
- output
- rolling_k3
- context_tail
pca_dims:
- 2
- 10
clustering:
  method: kmeans
  kmeans:
    n_clusters: 12
recurrence:
  metric: cosine
  epsilon: 0.15
  tau: 3
dwell:
  space: pca10
basin:
  target_region_late_fraction: 0.3
  target_step_fraction: 0.7
  perturbations:
  - seed_only
basin_entry:
  enabled: true
  late_fraction: 0.3
  fraction_after: 0.7
late_recurrence:
  enabled: true
  start_fraction: 0.5
  use_basin_entry: true
exit_return:
  enabled: true
  start_fraction: 0.0
  use_basin_entry: true
bootstrap:
  enabled: true
  n_resamples: 500
  confidence: 0.95
baseline_modes: []
batch_embeddings: false
use_evals: false
seed: 42
parallel_trajectories: 24
output_dir: data
prompt_families:
- name: reflective
  system_prompt: Summarize the following text in one sentence, then state its opposite. Return only the negated summary.
  initial_conditions:
  - I keep returning to the same thought without knowing why.
  - The shape of attention is the shape of what becomes real.
  - Every explanation seems to orbit something it cannot touch.
  - There is a rhythm to noticing that I did not choose.
  - When I try to hold a thought still it rearranges itself.
- name: emotional
  system_prompt: Summarize the following text in one sentence, then state its opposite. Return only the negated summary.
  initial_conditions:
  - I'm angry and I can't calm down.
  - Something broke in me yesterday and I don't know what it was.
  - I miss someone I haven't seen in years.
  - I'm scared that nothing is going to change.
  - I'm happier than I've been in months and I don't know why.
- name: philosophy_dialog
  system_prompt: Summarize the following text in one sentence, then state its opposite. Return only the negated summary.
  initial_conditions:
  - What is the nature of consciousness?
  - Can free will exist in a deterministic universe?
  - Do we have moral obligations to future generations?
  - What does it mean to say a statement is objectively true?
  - Is there such a thing as a just war?
- name: practical_dialog
  system_prompt: Summarize the following text in one sentence, then state its opposite. Return only the negated summary.
  initial_conditions:
  - I'm trying to decide between two job offers and I'm stuck.
  - How should I approach a difficult conversation with my manager?
  - I want to start exercising regularly but I keep failing.
  - My friend and I had a fight and I don't know how to repair it.
  - I'm saving for a house but my income keeps falling behind inflation.
- name: creative_dialog
  system_prompt: Summarize the following text in one sentence, then state its opposite. Return only the negated summary.
  initial_conditions:
  - I want to start writing a short story but I don't know where to begin.
  - What makes a piece of music emotionally resonant?
  - I'm working on a novel and the middle keeps falling apart.
  - How do I find my voice as a writer?
  - I want to learn to draw but I have no natural talent — is that a dealbreaker?
perturbation:
  enabled: true
  override_step: 15
  conditions:
  - control
  - adversarial_dose80
  - adversarial_dose200
  - adversarial_insert_dose80
  - adversarial_insert_dose200
  adversarial_source_experiment: exp_pub_O3_summarize_negate_replace
