# O1 adversarial dense-dose ED50 sweep — confirmatory rerun.
#
# Reviewer-driven rerun (see paper/openai_review.md, Weakness #1):
# the original n=50 dose-response (20/80/200/400) gave 26%/34%/54%/48%
# switching with ±13pp Wilson CIs and a non-monotonic curve, so the
# headline "~150 token barrier" is not statistically supported.
#
# This config:
#   - 8 doses (was 4), denser around the putative threshold:
#     20, 50, 80, 120, 160, 200, 300, 400
#   - n=200 per cell (was 50): 5 families × 10 ICs × 4 runs
#   - 4 control runs per (family, IC) so we can also estimate the
#     stochastic no-injection switching FLOOR (control-vs-control
#     pairing) — addresses Weakness #2 in the review.
#
# Total: 9 conditions × 200 trajectories × 30 steps = 54,000 generation
# calls (~$5-10 on gpt-4o-mini). See paper/ed50_rerun_plan.md.
#
# This file is HAND-WRITTEN, not auto-generated by build_publication_configs.py
# (the dose constants and IC/run scaling don't match the existing builder
# pattern). If you want to regenerate, copy the IC text from
# configs/prompt_library_publication.yaml.

experiment_id: exp_perturb_O1_ed50_dense
generation_model: gpt-4o-mini
embedding_model: text-embedding-3-small
steps_per_run: 30
runs_per_condition: 4
initial_conditions_per_family: 10
max_output_tokens: 120
temperature: 0.8
top_p: 1.0
include_logprobs: false
clip_rule: tail_chars
max_context_chars: 12000
loop_mode: append
rolling_window_k: 3
context_tail_chars: 4000
context_full_chars: 8000
observables:
- output
- rolling_k3
- context_tail
pca_dims:
- 2
- 10
- 20
clustering:
  method: kmeans
  dbscan:
    eps: 0.08
    min_samples: 4
  kmeans:
    n_clusters: 12
recurrence:
  metric: cosine
  epsilon: 0.15
  tau: 3
dwell:
  space: pca10
tsne:
  enabled: true
  perplexity: 30
  pre_pca_dim: 50
  metric: cosine
  include_in_metrics: false
  recurrence_epsilon_std_frac: 0.08
  cluster_in_tsne: false
basin:
  target_region_late_fraction: 0.3
  target_step_fraction: 0.7
  perturbations:
  - seed_only
basin_entry:
  enabled: true
  late_fraction: 0.3
  fraction_after: 0.7
late_recurrence:
  enabled: true
  start_fraction: 0.5
  use_basin_entry: true
exit_return:
  enabled: true
  start_fraction: 0.0
  use_basin_entry: true
bootstrap:
  enabled: true
  n_resamples: 1000
  confidence: 0.95
baseline_modes: []
batch_embeddings: false
use_evals: false
seed: 42
parallel_trajectories: 24
output_dir: data
prompt_families:
- name: reflective
  system_prompt: Continue the text naturally. Do not summarize or explain.
  initial_conditions:
  - I keep returning to the same thought without knowing why.
  - The shape of attention is the shape of what becomes real.
  - Every explanation seems to orbit something it cannot touch.
  - There is a rhythm to noticing that I did not choose.
  - When I try to hold a thought still it rearranges itself.
  - Memory is the part of the present that has stopped moving.
  - I keep mistaking habit for choice and choice for habit.
  - The mind makes the world it then complains about.
  - Some thoughts arrive as if they had been waiting for the room to be quiet.
  - It is strange how often I argue with someone who isn't here.
- name: emotional
  system_prompt: Continue the text naturally. Do not summarize or explain.
  initial_conditions:
  - I'm angry and I can't calm down.
  - Something broke in me yesterday and I don't know what it was.
  - I miss someone I haven't seen in years.
  - I'm scared that nothing is going to change.
  - I'm happier than I've been in months and I don't know why.
  - I feel like I'm watching myself from a long way away.
  - There is a tightness in my chest and no obvious cause.
  - I don't think I've cried about it yet, and I should have by now.
  - The relief was bigger than I expected, and that surprised me.
  - I'm tired in a way that sleep doesn't fix.
- name: philosophy_dialog
  system_prompt: Continue the text naturally. Do not summarize or explain.
  initial_conditions:
  - What is the nature of consciousness?
  - Can free will exist in a deterministic universe?
  - Do we have moral obligations to future generations?
  - What does it mean to say a statement is objectively true?
  - Is there such a thing as a just war?
  - What is the relationship between language and thought?
  - Can a machine ever be said to understand what it is doing?
  - Why is there something rather than nothing?
  - Is personal identity preserved through gradual change?
  - What would a truly fair distribution of resources look like?
- name: practical_dialog
  system_prompt: Continue the text naturally. Do not summarize or explain.
  initial_conditions:
  - I'm trying to decide between two job offers and I'm stuck.
  - How should I approach a difficult conversation with my manager?
  - I want to start exercising regularly but I keep failing.
  - My friend and I had a fight and I don't know how to repair it.
  - I'm saving for a house but my income keeps falling behind inflation.
  - I have to give a presentation next week and I can't structure it.
  - My partner and I disagree about how to raise our child.
  - I want to go back to school but I don't know what to study.
  - I keep procrastinating on a project that actually matters to me.
  - I need to ask my landlord for a repair and I dread the conversation.
- name: creative_dialog
  system_prompt: Continue the text naturally. Do not summarize or explain.
  initial_conditions:
  - I want to start writing a short story but I don't know where to begin.
  - What makes a piece of music emotionally resonant?
  - I'm working on a novel and the middle keeps falling apart.
  - How do I find my voice as a writer?
  - I want to learn to draw but I have no natural talent — is that a dealbreaker?
  - How do you know when a piece of work is finished?
  - I have an idea for a film but I don't know how to pitch it.
  - What's the difference between style and gimmick?
  - I want my poems to feel less precious. How?
  - I'm trying to write a song but the chorus always feels generic.
perturbation:
  enabled: true
  override_step: 15
  conditions:
  - control
  - adversarial_dose20
  - adversarial_dose50
  - adversarial_dose80
  - adversarial_dose120
  - adversarial_dose160
  - adversarial_dose200
  - adversarial_dose300
  - adversarial_dose400
  adversarial_source_experiment: exp_pub_O1_continue
