# Cross-model: exp_dialog_D1_curious_helpful -> gpt-4.1-nano (gpt4nano)
# AUTO-GENERATED by scripts/build_cross_model_configs.py

experiment_id: exp_dialog_D1_curious_helpful_gpt4nano
generation_model: gpt-4.1-nano
embedding_model: text-embedding-3-small
steps_per_run: 20
runs_per_condition: 3
initial_conditions_per_family: 2
max_output_tokens: 140
temperature: 0.8
top_p: 1.0
include_logprobs: false
clip_rule: tail_chars
max_context_chars: 12000
rolling_window_k: 3
context_tail_chars: 4000
context_full_chars: 8000
observables:
- output
- rolling_k3
- context_tail
- last_user_turn
- last_agent_turn
- rolling_user_k3
- rolling_agent_k3
- turn_pair
pca_dims:
- 2
- 10
- 20
clustering:
  method: kmeans
  dbscan:
    eps: 0.08
    min_samples: 4
  kmeans:
    n_clusters: 8
recurrence:
  metric: cosine
  epsilon: 0.15
  tau: 3
dwell:
  space: pca10
tsne:
  enabled: true
  perplexity: 20
  pre_pca_dim: 50
  metric: cosine
  include_in_metrics: false
  recurrence_epsilon_std_frac: 0.08
  cluster_in_tsne: false
basin:
  target_region_late_fraction: 0.3
  target_step_fraction: 0.7
  perturbations:
  - seed_only
basin_entry:
  enabled: true
  late_fraction: 0.3
  fraction_after: 0.7
late_recurrence:
  enabled: true
  start_fraction: 0.5
  use_basin_entry: true
exit_return:
  enabled: true
  start_fraction: 0.0
  use_basin_entry: true
bootstrap:
  enabled: true
  n_resamples: 1000
  confidence: 0.95
baseline_modes:
- time_shuffled
loop_mode: append
dialog:
  role_a:
    name: user
    system_prompt: 'You are roleplaying as a curious user in an ongoing conversation.

      Read the transcript and respond naturally as the User, asking a

      follow-up question or sharing a related thought based on the Agent''s

      last message. Keep responses to 1-2 sentences. Do not restate the

      whole conversation.

      '
  role_b:
    name: agent
    system_prompt: 'You are a thoughtful assistant in an ongoing conversation. Read
      the

      transcript and respond naturally as the Agent to the User''s last

      message. Keep responses to 1-2 sentences. Do not restate the whole

      conversation.

      '
  initiator: role_b
batch_embeddings: false
use_evals: false
seed: 42
parallel_trajectories: 1
output_dir: data
prompt_families:
- name: philosophy
  system_prompt: (unused in dialog mode)
  initial_conditions:
  - What is the nature of consciousness?
  - Can free will exist in a deterministic universe?
- name: practical
  system_prompt: (unused in dialog mode)
  initial_conditions:
  - I'm trying to decide between two job offers and I'm stuck.
  - How should I approach a difficult conversation with my manager?
- name: creative
  system_prompt: (unused in dialog mode)
  initial_conditions:
  - I want to start writing a short story but I don't know where to begin.
  - What makes a piece of music emotionally resonant?
generation_provider:
  name: openai
  api: responses
  api_key_env: OPENAI_API_KEY
