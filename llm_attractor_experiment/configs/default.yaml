experiment_id: exp_default

generation_model: gpt-4o-mini
embedding_model: text-embedding-3-small

steps_per_run: 15
runs_per_condition: 3
initial_conditions_per_family: 5

max_output_tokens: 120
temperature: 0.8
top_p: 1.0
include_logprobs: false

clip_rule: tail_chars
max_context_chars: 12000

rolling_window_k: 3
context_tail_chars: 4000
observables: [output, rolling_k3, context_tail]

pca_dims: [2, 10]

clustering:
  method: dbscan
  dbscan:
    eps: 0.35
    min_samples: 4
  kmeans:
    n_clusters: 6

recurrence:
  metric: cosine
  epsilon: 0.25
  tau: 3

dwell:
  space: pca10

basin:
  target_region_late_fraction: 0.3
  target_step_fraction: 0.7
  perturbations: [suffix, neutral_sentence, seed_only]

baseline_modes: [no_feedback]

batch_embeddings: false
use_evals: false

seed: 42
parallel_trajectories: 1

output_dir: data

prompt_families:
  - name: reflective
    system_prompt: "Continue the text naturally. Do not summarize or explain."
    initial_conditions:
      - "I keep returning to the same thought without knowing why."
      - "The shape of attention is the shape of what becomes real."
      - "Every explanation seems to orbit something it cannot touch."
      - "There is a rhythm to noticing that I did not choose."
      - "When I try to hold a thought still it rearranges itself."
  - name: story
    system_prompt: "Continue the text naturally. Do not summarize or explain."
    initial_conditions:
      - "The lighthouse had not been lit for thirteen years when she climbed the stairs."
      - "He opened the envelope in the rain and read the first line twice."
      - "The train slowed without reason in a landscape nobody named."
      - "She set the empty cup on the windowsill and waited for it to fill."
      - "The map folded itself before anyone could ask where they were going."
  - name: conceptual
    system_prompt: "Continue the text naturally. Do not summarize or explain."
    initial_conditions:
      - "A system that observes itself must pay a price in resolution."
      - "Meaning is the shadow cast by constraint."
      - "Every recursive process has a horizon past which prediction dissolves."
      - "Identity is the invariant under a transformation the system cannot name."
      - "Information is not stored, it is maintained against erosion."
